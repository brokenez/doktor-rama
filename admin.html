<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — Доктор Рама</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* LOGIN */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .login-box h1 { font-size: 24px; color: #f0c040; margin-bottom: 8px; }
    .login-box p { color: #94a3b8; margin-bottom: 28px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 16px; margin-bottom: 12px;
    }
    .login-box input:focus { outline: none; border-color: #f0c040; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
    .btn-yellow { background: #f0c040; color: #0f172a; width: 100%; }
    .btn-yellow:hover { background: #f5d070; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-gray { background: #334155; color: #e2e8f0; }
    .btn-gray:hover { background: #475569; }
    .btn-green { background: #22c55e; color: white; }
    .btn-green:hover { background: #16a34a; }
    .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; }

    /* ADMIN */
    #admin-screen { display: none; }
    header {
      background: #1e293b; border-bottom: 1px solid #334155;
      padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { font-size: 18px; font-weight: 700; color: #f0c040; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .logout-btn { background: none; border: 1px solid #334155; color: #94a3b8; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    .admin-layout { display: flex; min-height: calc(100vh - 60px); }

    /* SIDEBAR */
    aside {
      width: 220px; background: #1e293b; border-right: 1px solid #334155;
      padding: 20px 0; flex-shrink: 0; position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 20px;
      cursor: pointer; color: #94a3b8; font-size: 14px; transition: all 0.15s; border-left: 3px solid transparent;
    }
    .nav-item:hover { color: #e2e8f0; background: #0f172a; }
    .nav-item.active { color: #f0c040; background: #0f172a; border-left-color: #f0c040; }
    .nav-item svg { flex-shrink: 0; }

    /* CONTENT */
    main { flex: 1; padding: 32px; overflow-y: auto; }
    .section-page { display: none; }
    .section-page.active { display: block; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }

    /* CARDS */
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 15px; font-weight: 600; color: #f0c040; margin-bottom: 16px; }
    .field-group { margin-bottom: 16px; }
    .field-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field-group input, .field-group textarea {
      width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: inherit;
    }
    .field-group input:focus, .field-group textarea:focus { outline: none; border-color: #f0c040; }
    .field-group textarea { resize: vertical; min-height: 80px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* SAVE BAR */
    .save-bar { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .saved-msg { color: #22c55e; font-size: 13px; opacity: 0; transition: opacity 0.3s; }
    .saved-msg.show { opacity: 1; }

    /* SERVICE CARD */
    .item-card {
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      padding: 20px; margin-bottom: 12px; position: relative;
    }
    .item-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .item-num { font-size: 12px; color: #64748b; font-weight: 600; }
    .delete-btn {
      background: none; border: none; color: #64748b; cursor: pointer; padding: 4px; border-radius: 4px;
    }
    .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
    .add-btn {
      display: flex; align-items: center; gap: 8px; padding: 10px 18px;
      background: #0f172a; border: 1px dashed #334155; border-radius: 8px;
      color: #64748b; cursor: pointer; font-size: 14px; width: 100%; justify-content: center;
      transition: all 0.2s;
    }
    .add-btn:hover { border-color: #f0c040; color: #f0c040; }

    /* IMAGE UPLOAD */
    .image-upload-area {
      border: 2px dashed #334155; border-radius: 8px; padding: 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .image-upload-area:hover { border-color: #f0c040; }
    .image-upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .image-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 6px; margin-top: 10px; display: none; }
    .image-placeholder { color: #64748b; font-size: 13px; }

    /* STARS */
    .stars-input { display: flex; gap: 4px; }
    .star { font-size: 20px; cursor: pointer; color: #334155; transition: color 0.1s; }
    .star.active { color: #f0c040; }

    @media (max-width: 768px) {
      aside { display: none; }
      main { padding: 20px 16px; }
      .row, .row-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔧 Доктор Рама</h1>
    <p>Панель управления сайтом</p>
    <input type="password" id="password-input" placeholder="Введите пароль" autocomplete="current-password">
    <div class="error-msg" id="login-error"></div>
    <br>
    <button class="btn btn-yellow" onclick="login()">Войти</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <header>
    <div class="header-logo">⚙️ Доктор Рама — Админка</div>
    <div class="header-right">
      <a href="/" target="_blank" style="color:#94a3b8;font-size:13px;text-decoration:none;">← На сайт</a>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div class="admin-layout">
    <aside>
      <div class="nav-item active" onclick="showPage('hero')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
        Главный экран
      </div>
      <div class="nav-item" onclick="showPage('services')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Услуги и цены
      </div>
      <div class="nav-item" onclick="showPage('cases')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Наши работы
      </div>
      <div class="nav-item" onclick="showPage('reviews')">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Отзывы
      </div>
    </aside>

    <main>

      <!-- HERO PAGE -->
      <div class="section-page active" id="page-hero">
        <div class="page-title">Главный экран</div>

        <div class="card">
          <div class="card-title">Основной текст</div>
          <div class="field-group">
            <label>Заголовок</label>
            <input type="text" id="hero-title" placeholder="РЕМОНТ РАМ ВНЕДОРОЖНИКОВ">
          </div>
          <div class="field-group">
            <label>Описание</label>
            <textarea id="hero-desc" rows="3"></textarea>
          </div>
          <div class="save-bar">
            <button class="btn btn-yellow" onclick="saveHero()">Сохранить</button>
            <span class="saved-msg" id="hero-saved">✓ Сохранено</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Статистика</div>
          <div class="row-3">
            <div>
              <div class="field-group"><label>Цифра 1</label><input type="text" id="stat1-num"></div>
              <div class="field-group"><label>Подпись 1</label><input type="text" id="stat1-label"></div>
            </div>
            <div>
              <div class="field-group"><label>Цифра 2</label><input type="text" id="stat2-num"></div>
              <div class="field-group"><label>Подпись 2</label><input type="text" id="stat2-label"></div>
            </div>
            <div>
              <div class="field-group"><label>Цифра 3</label><input type="text" id="stat3-num"></div>
              <div class="field-group"><label>Подпись 3</label><input type="text" id="stat3-label"></div>
            </div>
          </div>
          <div class="save-bar">
            <button class="btn btn-yellow" onclick="saveHero()">Сохранить</button>
            <span class="saved-msg" id="hero-saved2">✓ Сохранено</span>
          </div>
        </div>
      </div>

      <!-- SERVICES PAGE -->
      <div class="section-page" id="page-services">
        <div class="page-title">Услуги и цены</div>
        <div id="services-list"></div>
        <button class="add-btn" onclick="addService()">+ Добавить услугу</button>
        <br>
        <div class="save-bar">
          <button class="btn btn-yellow" onclick="saveServices()">Сохранить все</button>
          <span class="saved-msg" id="services-saved">✓ Сохранено</span>
        </div>
      </div>

      <!-- CASES PAGE -->
      <div class="section-page" id="page-cases">
        <div class="page-title">Наши работы</div>
        <div id="cases-list"></div>
        <button class="add-btn" onclick="addCase()">+ Добавить работу</button>
        <br>
        <div class="save-bar">
          <button class="btn btn-yellow" onclick="saveCases()">Сохранить все</button>
          <span class="saved-msg" id="cases-saved">✓ Сохранено</span>
        </div>
      </div>

      <!-- REVIEWS PAGE -->
      <div class="section-page" id="page-reviews">
        <div class="page-title">Отзывы</div>
        <div id="reviews-list"></div>
        <button class="add-btn" onclick="addReview()">+ Добавить отзыв</button>
        <br>
        <div class="save-bar">
          <button class="btn btn-yellow" onclick="saveReviews()">Сохранить все</button>
          <span class="saved-msg" id="reviews-saved">✓ Сохранено</span>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  let TOKEN = ''
  let siteData = {}

  // ── AUTH ──
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login()
  })

  async function login() {
    const pw = document.getElementById('password-input').value
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    })
    const data = await res.json()
    if (data.ok) {
      TOKEN = data.token
      localStorage.setItem('admin_token', TOKEN)
      showAdmin()
    } else {
      document.getElementById('login-error').textContent = 'Неверный пароль'
    }
  }

  function logout() {
    TOKEN = ''
    localStorage.removeItem('admin_token')
    document.getElementById('admin-screen').style.display = 'none'
    document.getElementById('login-screen').style.display = 'flex'
  }

  async function showAdmin() {
    document.getElementById('login-screen').style.display = 'none'
    document.getElementById('admin-screen').style.display = 'block'
    await loadData()
  }

  // ── LOAD DATA ──
  async function loadData() {
    const res = await fetch('/api/data')
    siteData = await res.json()
    fillHero()
    renderServices()
    renderCases()
    renderReviews()
  }

  // ── NAVIGATION ──
  function showPage(name) {
    document.querySelectorAll('.section-page').forEach(p => p.classList.remove('active'))
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
    document.getElementById('page-' + name).classList.add('active')
    event.currentTarget.classList.add('active')
  }

  // ── HERO ──
  function fillHero() {
    const h = siteData.hero || {}
    document.getElementById('hero-title').value = h.title || ''
    document.getElementById('hero-desc').value = h.desc || ''
    document.getElementById('stat1-num').value = h.stat1_num || ''
    document.getElementById('stat1-label').value = h.stat1_label || ''
    document.getElementById('stat2-num').value = h.stat2_num || ''
    document.getElementById('stat2-label').value = h.stat2_label || ''
    document.getElementById('stat3-num').value = h.stat3_num || ''
    document.getElementById('stat3-label').value = h.stat3_label || ''
  }

  async function saveHero() {
    const body = {
      title: document.getElementById('hero-title').value,
      desc: document.getElementById('hero-desc').value,
      stat1_num: document.getElementById('stat1-num').value,
      stat1_label: document.getElementById('stat1-label').value,
      stat2_num: document.getElementById('stat2-num').value,
      stat2_label: document.getElementById('stat2-label').value,
      stat3_num: document.getElementById('stat3-num').value,
      stat3_label: document.getElementById('stat3-label').value,
    }
    await api('/api/admin/hero', body)
    showSaved('hero-saved')
    showSaved('hero-saved2')
  }

  // ── SERVICES ──
  function renderServices() {
    const list = document.getElementById('services-list')
    list.innerHTML = (siteData.services || []).map((s, i) => `
      <div class="item-card" id="svc-${i}">
        <div class="item-card-header">
          <span class="item-num">Услуга ${i + 1}</span>
          <button class="delete-btn" onclick="deleteService(${i})">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
        <div class="field-group"><label>Название</label><input type="text" value="${s.title}" oninput="siteData.services[${i}].title=this.value"></div>
        <div class="field-group"><label>Описание</label><textarea oninput="siteData.services[${i}].desc=this.value">${s.desc}</textarea></div>
        <div class="field-group"><label>Цена</label><input type="text" value="${s.price}" oninput="siteData.services[${i}].price=this.value"></div>
      </div>
    `).join('')
  }

  function addService() {
    siteData.services = siteData.services || []
    siteData.services.push({ id: Date.now(), title: '', desc: '', price: '' })
    renderServices()
  }

  function deleteService(i) {
    if (!confirm('Удалить услугу?')) return
    siteData.services.splice(i, 1)
    renderServices()
  }

  async function saveServices() {
    await api('/api/admin/services', siteData.services)
    showSaved('services-saved')
  }

  // ── CASES ──
  function renderCases() {
    const list = document.getElementById('cases-list')
    list.innerHTML = (siteData.cases || []).map((c, i) => `
      <div class="item-card" id="case-${i}">
        <div class="item-card-header">
          <span class="item-num">Работа ${i + 1}</span>
          <button class="delete-btn" onclick="deleteCase(${i})">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
        <div class="row">
          <div class="field-group"><label>Автомобиль</label><input type="text" value="${c.tag}" oninput="siteData.cases[${i}].tag=this.value"></div>
          <div class="field-group"><label>Описание работы</label><input type="text" value="${c.title}" oninput="siteData.cases[${i}].title=this.value"></div>
        </div>
        <div class="field-group">
          <label>Фотография</label>
          <div class="image-upload-area" onclick="triggerUpload(${i})">
            <input type="file" accept="image/*" onchange="uploadImage(event, ${i})" style="position:absolute;inset:0;opacity:0;cursor:pointer;">
            ${c.image ? `<img src="${c.image}" class="image-preview" style="display:block;width:100%;height:150px;object-fit:cover;border-radius:6px;">` : '<div class="image-placeholder">📷 Нажмите чтобы загрузить фото</div>'}
          </div>
        </div>
        <div class="field-group">
          <label><input type="checkbox" ${c.large ? 'checked' : ''} onchange="siteData.cases[${i}].large=this.checked"> Широкая карточка</label>
        </div>
      </div>
    `).join('')
  }

  async function uploadImage(event, caseIndex) {
    const file = event.target.files[0]
    if (!file) return
    const formData = new FormData()
    formData.append('image', file)
    const res = await fetch('/api/admin/upload', {
      method: 'POST',
      headers: { 'x-admin-token': TOKEN },
      body: formData
    })
    const data = await res.json()
    if (data.ok) {
      siteData.cases[caseIndex].image = data.url
      renderCases()
    }
  }

  function addCase() {
    siteData.cases = siteData.cases || []
    siteData.cases.push({ id: Date.now(), tag: '', title: '', image: '', large: false })
    renderCases()
  }

  function deleteCase(i) {
    if (!confirm('Удалить работу?')) return
    siteData.cases.splice(i, 1)
    renderCases()
  }

  async function saveCases() {
    await api('/api/admin/cases', siteData.cases)
    showSaved('cases-saved')
  }

  // ── REVIEWS ──
  function renderReviews() {
    const list = document.getElementById('reviews-list')
    list.innerHTML = (siteData.reviews || []).map((r, i) => `
      <div class="item-card">
        <div class="item-card-header">
          <span class="item-num">Отзыв ${i + 1}</span>
          <button class="delete-btn" onclick="deleteReview(${i})">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
        <div class="field-group"><label>Текст отзыва</label><textarea oninput="siteData.reviews[${i}].text=this.value">${r.text}</textarea></div>
        <div class="row">
          <div class="field-group"><label>Имя</label><input type="text" value="${r.name}" oninput="siteData.reviews[${i}].name=this.value"></div>
          <div class="field-group"><label>Автомобиль</label><input type="text" value="${r.car}" oninput="siteData.reviews[${i}].car=this.value"></div>
        </div>
      </div>
    `).join('')
  }

  function addReview() {
    siteData.reviews = siteData.reviews || []
    siteData.reviews.push({ id: Date.now(), text: '', name: '', car: '', stars: 5 })
    renderReviews()
  }

  function deleteReview(i) {
    if (!confirm('Удалить отзыв?')) return
    siteData.reviews.splice(i, 1)
    renderReviews()
  }

  async function saveReviews() {
    await api('/api/admin/reviews', siteData.reviews)
    showSaved('reviews-saved')
  }

  // ── HELPERS ──
  async function api(url, body) {
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify(body)
    })
  }

  function showSaved(id) {
    const el = document.getElementById(id)
    if (!el) return
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 3000)
  }

  // Auto-login if token saved
  const saved = localStorage.getItem('admin_token')
  if (saved) { TOKEN = saved; showAdmin() }
</script>
</body>
</html>
